# Server Configuration
server.port=8080
spring.datasource.username=your_username
spring.datasource.password=your_password

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/exoapp
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.platform=mysql


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.main.web-application-type=servlet

# Disable Spring Security's default login page
spring.security.form-login.enabled=true
# Allow access to the custom login endpoint without authentication
spring.security.filter.dispatcher-types=ASYNC,ERROR,REQUEST


# Optional: Logging Configuration
logging.level.org.springframework=DEBUG
logging.level.com.exoapp=DEBUG
